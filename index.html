<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>軟裝出租王 ✦ 可愛版</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:#FFFDE7;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#FFCC02;border-radius:3px}
::-webkit-scrollbar-track{background:#FFF8DC}
:root{
--y:#FFCC02;--y-light:#FFF8DC;--y-dark:#E6B800;--y-deep:#C49B00;
--cream:#FFFDF0;--honey:#FFE082;--amber:#FFCA28;--gold:#FFD54F;
--mint:#B8E8D0;--mint-light:#E0F5EC;--sky:#B5D8F7;--sky-light:#E3F2FD;
--lav:#D4B8E8;--peach:#FFD4B8;--peach-light:#FFF0E6;
--warm:#FFF3C4;--warm-light:#FFFDE7;
--brown:#6D5D3F;--brown-light:#8B7B5E;
--text:#4A3B20;--text-light:#7A6B4E;--text-faint:#A89870;
--bg:#FFFDF0;--card:rgba(255,255,250,.9);--shadow:rgba(180,160,100,.12);
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fadeIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
@keyframes gradMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,204,2,.4)}50%{box-shadow:0 0 0 8px rgba(255,204,2,0)}}
@keyframes bounceIn{0%{transform:scale(0.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
.app{display:flex;height:100vh;width:100vw;background:var(--bg)}
.viewport{flex:1;position:relative;background:#E8E0D0;overflow:hidden}
#canvas3d{width:100%;height:100%;display:block}
.sidebar{width:330px;background:var(--y-light);display:flex;flex-direction:column;border-left:3px solid var(--y);overflow:hidden}
.hud{position:absolute;top:0;left:0;right:0;padding:8px 12px;display:flex;justify-content:space-between;
align-items:center;background:linear-gradient(180deg,rgba(255,253,240,.95),rgba(255,253,240,.0));
z-index:10;pointer-events:none;flex-wrap:wrap;gap:5px}
.hud>*{pointer-events:auto}
.hud-pill{display:flex;align-items:center;gap:4px;padding:3px 10px;background:var(--card);
border-radius:20px;font-size:10px;color:var(--text);box-shadow:0 2px 6px var(--shadow);border:2px solid var(--y)}
.hbar{width:60px;height:7px;background:var(--y-light);border-radius:4px;overflow:hidden;border:1px solid var(--honey)}
.hbar-f{height:100%;border-radius:3px;transition:width .4s,background .3s}
.view-btns{position:absolute;bottom:14px;left:14px;z-index:10;display:flex;gap:5px;flex-wrap:wrap}
.vb{padding:6px 12px;font-size:10px;border:2px solid var(--y);border-radius:20px;
background:var(--card);color:var(--y-deep);cursor:pointer;transition:all .2s;box-shadow:0 2px 6px var(--shadow);font-weight:bold}
.vb:hover,.vb.on{background:var(--y);color:#fff}
.tool-btns{position:absolute;bottom:14px;right:14px;z-index:10;display:flex;gap:5px}
.tb{padding:6px 12px;font-size:12px;border:2px solid var(--y);border-radius:20px;
background:var(--card);cursor:pointer;transition:all .2s;box-shadow:0 2px 6px var(--shadow)}
.tb:hover{background:var(--y);color:#fff}
.tb.on{background:var(--y);animation:pulse 2s infinite}
.viewport.drag-over::after{content:'✦ 放到這裡 ✦';position:absolute;inset:0;display:flex;align-items:center;
justify-content:center;background:rgba(255,204,2,.15);border:3px dashed var(--y);
font-size:22px;font-weight:900;color:var(--y-deep);pointer-events:none;z-index:5;border-radius:8px}
.sel-indicator{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);z-index:10;
padding:6px 16px;background:var(--y);color:#fff;border-radius:16px;font-size:11px;font-weight:bold;
box-shadow:0 3px 10px var(--shadow);display:none;pointer-events:none;white-space:nowrap}
.float-actions{position:absolute;z-index:15;display:none;gap:6px;animation:fadeIn .2s}
.float-actions.on{display:flex}
.fa-btn{width:48px;height:48px;border-radius:50%;border:2px solid var(--y);background:var(--card);
font-size:20px;cursor:pointer;box-shadow:0 3px 12px var(--shadow);display:flex;align-items:center;
justify-content:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.fa-btn:active{transform:scale(.9);background:var(--y);}
.sb-head{padding:10px 14px;background:linear-gradient(135deg,var(--y),var(--honey));text-align:center;flex-shrink:0;position:relative}
.sb-head h2{font-size:15px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.15)}
.sb-head p{font-size:9px;color:rgba(255,255,255,.85)}
.sb-close{display:none;position:absolute;top:6px;right:10px;width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,.5);background:rgba(255,255,255,.25);color:#fff;font-size:18px;cursor:pointer;align-items:center;justify-content:center;z-index:101}
.sb-close:active{transform:scale(.9);background:rgba(255,255,255,.5)}
.sb-drag-bar{display:none;width:40px;height:5px;background:rgba(255,255,255,.6);border-radius:3px;margin:6px auto 2px;cursor:pointer}
.tenant{padding:8px 10px;background:var(--card);border-radius:14px;margin:6px 8px;
box-shadow:0 2px 8px var(--shadow);border:2px solid var(--warm);flex-shrink:0}
.tenant-top{display:flex;gap:8px;align-items:center}
.tenant-av{width:42px;height:42px;flex-shrink:0}
.tenant-name{font-size:12px;font-weight:bold;color:var(--text)}
.tenant-desc{font-size:9px;color:var(--text-light)}
.needs{margin-top:4px;font-size:9px;color:var(--text);display:flex;flex-wrap:wrap;gap:0 8px}
.nd{display:flex;align-items:center;gap:3px;padding:1px 0}
.nd-ok{color:#66BB6A}.nd-no{color:#EF5350}
.tabs{display:flex;overflow-x:auto;padding:3px 6px;gap:2px;flex-shrink:0;background:rgba(255,255,255,.4)}
.tab{padding:4px 8px;font-size:9px;border:2px solid transparent;border-radius:14px;
cursor:pointer;background:transparent;color:var(--text-faint);white-space:nowrap;transition:all .2s;font-weight:bold}
.tab:hover{color:var(--y-dark)}.tab.on{background:var(--y);color:#fff;border-color:var(--y-dark)}
.item-list{flex:1;min-height:0;overflow-y:auto;padding:4px 6px;display:flex;flex-direction:column;gap:4px;-webkit-overflow-scrolling:touch}
.icard{display:flex;gap:6px;padding:6px 8px;background:var(--card);border:2px solid var(--warm);border-radius:12px;
cursor:grab;transition:all .2s;align-items:flex-start;box-shadow:0 1px 4px var(--shadow);user-select:none}
.icard:active{cursor:grabbing}.icard:hover{border-color:var(--y);transform:translateY(-1px)}
.icard.sel{border-color:var(--y-dark);background:var(--warm)}.icard.cant{opacity:.3;pointer-events:none}
.ithumb{width:38px;height:38px;border-radius:8px;flex-shrink:0;border:2px solid var(--warm);display:flex;align-items:center;justify-content:center;font-size:18px}
.iinfo{flex:1;min-width:0}.iname{font-size:10px;font-weight:bold;color:var(--text)}
.icost{font-size:9px;color:var(--y-deep)}
.attr-bars{display:flex;flex-wrap:wrap;gap:1px 5px;margin-top:2px}
.attr-bar{display:flex;align-items:center;gap:2px;font-size:7px;color:var(--text-light)}
.attr-bar-bg{width:28px;height:4px;background:#eee;border-radius:3px;overflow:hidden}
.attr-bar-f{height:100%;border-radius:3px}
.cdots{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.cd{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid var(--warm);transition:all .15s}
.cd:hover{transform:scale(1.15);border-color:var(--y)}.cd.sel{border-color:var(--y-dark);transform:scale(1.15);box-shadow:0 0 0 2px var(--y)}
.placed{max-height:100px;overflow-y:auto;padding:4px 8px;flex-shrink:0;border-top:2px solid var(--warm);background:rgba(255,255,255,.3)}
.placed-title{font-size:9px;color:var(--text-faint);padding:2px 0}
.pi{display:flex;justify-content:space-between;align-items:center;padding:2px 6px;border-radius:8px;margin-bottom:1px;background:var(--card);border:1px solid var(--warm);font-size:9px;color:var(--text)}
.pi-rm{background:none;border:none;color:var(--y-deep);cursor:pointer;font-size:12px;padding:0 3px;font-weight:bold}
.pi-rm:hover{color:#E53935}
.bbar{padding:6px 8px;background:linear-gradient(180deg,rgba(255,255,255,.5),var(--y-light));border-top:2px solid var(--warm);display:flex;gap:5px;flex-shrink:0}
.bb{flex:1;padding:8px;font-size:11px;font-weight:bold;border:none;border-radius:12px;cursor:pointer;color:#fff;transition:all .2s;box-shadow:0 2px 6px var(--shadow)}
.bb:hover{transform:scale(1.02)}
.bb-green{background:linear-gradient(135deg,#81C784,#4CAF50)}
.bb-orange{background:linear-gradient(135deg,#FFB74D,#FF9800)}
.bb-red{background:linear-gradient(135deg,#EF9A9A,#EF5350)}
.bb-sky{background:linear-gradient(135deg,var(--sky),#64B5F6)}
.ov{display:none;position:fixed;inset:0;background:rgba(255,220,100,.2);z-index:200;align-items:center;justify-content:center;padding:15px;backdrop-filter:blur(8px)}
.ov.on{display:flex}
.ov-card{background:#fff;border:3px solid var(--y);border-radius:24px;padding:24px;max-width:420px;width:100%;text-align:center;color:var(--text);max-height:92vh;overflow-y:auto;box-shadow:0 10px 40px rgba(180,160,100,.2)}
.rent-big{font-size:36px;font-weight:900;color:#66BB6A}
.rent-up{font-size:14px;color:var(--y-deep);font-weight:bold;margin:3px 0}
.det{text-align:left;font-size:10px;color:var(--text-light);max-height:120px;overflow-y:auto;background:var(--y-light);border-radius:10px;padding:8px;margin:6px 0;border:1px solid var(--y)}
.det div{padding:1px 0;border-bottom:1px solid rgba(255,204,2,.15)}
.ob{padding:8px 24px;font-size:13px;font-weight:bold;border:none;border-radius:20px;cursor:pointer;color:#fff;margin:3px;transition:all .2s;box-shadow:0 3px 10px var(--shadow)}
.ob:hover{transform:scale(1.05)}
.listing-card{background:#fff;border-radius:16px;padding:20px;text-align:left;max-width:360px;width:100%;margin:10px auto;box-shadow:0 4px 20px var(--shadow);border:2px solid var(--y)}
.listing-card img{width:100%;border-radius:10px;margin-bottom:10px}
.listing-title{font-size:16px;font-weight:900;color:var(--text);margin-bottom:4px}
.listing-rent{font-size:22px;font-weight:900;color:#66BB6A}
.listing-tags{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
.listing-tag{padding:2px 8px;background:var(--y-light);border:1px solid var(--y);border-radius:10px;font-size:9px;color:var(--y-deep);font-weight:bold}
.listing-desc{font-size:11px;color:var(--text-light);line-height:1.6;margin:6px 0}
.listing-av{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--warm)}
.fs{position:fixed;inset:0;z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
.fs.on{display:flex}
#title-s{background:linear-gradient(135deg,#FFFDE7,#FFF8C4,#FFF9DB,#FFECB3);background-size:400% 400%;animation:gradMove 8s ease infinite}
#story-s{background:linear-gradient(180deg,#FFFDE7,#FFF3C4)}
#level-s{background:linear-gradient(180deg,#FFFDE7,#FFECB3);overflow-y:auto;justify-content:flex-start;padding-top:25px}
#end-s{background:linear-gradient(135deg,#FFECB3,#E0F0FF,#FFF5E0)}
.btn3{padding:14px 45px;font-size:18px;font-weight:900;border:none;border-radius:30px;cursor:pointer;color:#fff;transition:all .2s;margin:5px;box-shadow:0 4px 15px var(--shadow)}
.btn3:hover{transform:scale(1.05)}.btn3-y{background:linear-gradient(135deg,var(--y),var(--y-dark))}
.lvg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;max-width:660px;width:100%;margin:10px auto}
.lvc{background:var(--card);border:3px solid var(--warm);border-radius:16px;padding:12px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text);box-shadow:0 2px 8px var(--shadow)}
.lvc:hover{border-color:var(--y);transform:translateY(-2px)}.lvc.done{border-color:var(--mint);background:var(--mint-light)}.lvc.lock{opacity:.3;pointer-events:none}
.hint{position:fixed;bottom:15px;left:50%;transform:translateX(-50%);background:var(--card);border:2px solid var(--y);color:var(--text);padding:6px 18px;border-radius:18px;font-size:11px;z-index:400;animation:fadeIn .3s;pointer-events:none;box-shadow:0 4px 12px var(--shadow)}
.drag-ghost{position:fixed;pointer-events:none;z-index:999;padding:5px 12px;background:var(--y);color:#fff;border-radius:12px;font-size:11px;font-weight:bold;box-shadow:0 4px 12px var(--shadow);transform:translate(-50%,-50%);white-space:nowrap;opacity:.9}
/* Tutorial overlay */
.tutorial-ov{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.55);align-items:center;justify-content:center;padding:15px}
.tutorial-ov.on{display:flex}
.tut-card{background:#fff;border:3px solid var(--y);border-radius:24px;padding:24px;max-width:360px;width:100%;text-align:center;animation:bounceIn .5s;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.tut-step{display:none}.tut-step.on{display:block}
.tut-title{font-size:18px;font-weight:900;color:var(--y-deep);margin-bottom:10px}
.tut-icon{font-size:48px;margin:10px 0}
.tut-desc{font-size:13px;color:var(--text);line-height:1.8;margin:10px 0}
.tut-dots{display:flex;justify-content:center;gap:6px;margin:10px 0}
.tut-dot{width:10px;height:10px;border-radius:50%;background:var(--warm);transition:all .2s}
.tut-dot.on{background:var(--y);transform:scale(1.2)}
.tut-btn{padding:10px 30px;font-size:14px;font-weight:bold;border:none;border-radius:20px;cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--y),var(--y-dark));box-shadow:0 3px 10px var(--shadow);transition:all .2s}
.tut-btn:hover{transform:scale(1.05)}
/* Room setup overlay */
.room-setup-ov{display:none;position:fixed;inset:0;z-index:250;background:rgba(255,220,100,.2);align-items:center;justify-content:center;padding:15px;backdrop-filter:blur(8px)}
.room-setup-ov.on{display:flex}
.room-setup-card{background:#fff;border:3px solid var(--y);border-radius:24px;padding:24px;max-width:420px;width:100%;text-align:center;color:var(--text);max-height:92vh;overflow-y:auto;box-shadow:0 10px 40px rgba(180,160,100,.2);animation:bounceIn .5s}
.room-setup-title{font-size:18px;font-weight:900;color:var(--y-deep);margin-bottom:12px}
.color-section{margin:12px 0;text-align:left}
.color-section h3{font-size:12px;font-weight:bold;color:var(--text);margin-bottom:8px}
.color-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.color-swatch{width:100%;aspect-ratio:1;border:3px solid var(--warm);border-radius:12px;cursor:pointer;transition:all .2s;position:relative}
.color-swatch:hover{transform:scale(1.05);border-color:var(--y-dark)}
.color-swatch.sel{border-color:var(--y-dark);box-shadow:0 0 0 3px var(--y)}
.setup-btn{padding:12px 36px;font-size:14px;font-weight:bold;border:none;border-radius:20px;cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--y),var(--y-dark));box-shadow:0 3px 10px var(--shadow);transition:all .2s;margin-top:12px}
.setup-btn:hover{transform:scale(1.05)}
/* Mobile bottom sheet sidebar */
.sidebar-handle{display:none}
